<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>
</head>
<body>

<div class="head-container">
    <h1>Create your account</h1>
    <p>Join us in a couple of steps.</p>

    <form>
        <div class="form-container">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="Enter Full Name">
        </div>

        <div class="form-container">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="Enter Age">
        </div>

        <div class="form-container">
            <label for="dob">Date of birth</label>
            <input type="date" id="dob" value="DD-MM-YYYY">
        </div>

        <div class="form-container">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="form-container">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter a secure password">
        </div>

        <div class="form-container-checkbox">
            <label class="radio-title">Preferred contact</label>

                <label>
                    <input type="radio" name="contact" checked>
                    Email
                </label>

                <label>
                    <input type="radio" name="contact">
                    Phone
                </label>

                <label>
                    <input type="radio" name="contact">
                    SMS
                </label>
        </div>

        <div class="tail-container">
            <button type="submit" class="btn submit-btn">Submit</button>
            <button type="reset" class="btn reset-btn">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
