<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration</title>
</head>
<body>


<div class="head-container">
    <h1>Registration</h1>
    <p>Please complete all fields below</p>
    <hr>

    <form>
        <div class="form-container">
            <label for="name">Full name</label>
            <input type="text" id="name" placeholder="Enter Full Name">
        </div>

        <div class="form-container">
            <label for="postal">Postal Code</label>
            <input type="number" id="postal" placeholder="xxxxx">
        </div>

        <div class="form-container">
            <label for="dob">Date of birth</label>
            <input type="date" id="dob" value="DD-MM-YYYY">
        </div>

        <div class="form-container">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="form-container">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter a secure password">
        </div>

         <div class="form-container-dropdown">
            <label for="country">Country</label>
            <select id="country">
                <option value="usa">United States</option>
                <option value="canada">Canada</option>
                <option value="uk">United Kingdom</option>
                <option value="australia">Australia</option>
                <option value="other">Other</option>
        </div>
       
        <div class="tail-container">
            <button type="submit" class="btn submit-btn">Submit</button>
            <button type="reset" class="btn reset-btn">Reset</button>
        </div>
    </form>
</div>

</body>
</html>
